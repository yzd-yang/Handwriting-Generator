[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# 启用的规则集
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
]
# 忽略的规则
ignore = [
    "E402",  # module level import not at top（FastAPI 应用常需 load_dotenv() 先行）
    "E741",  # ambiguous variable name（部分变量名如 l 在数学上下文中可接受）
    "E501",  # line too long（由 black 格式化处理）
]

[tool.ruff.lint.per-file-ignores]
# 测试/验证脚本放宽规则
"verify_p1.py" = ["F541", "F841"]
"test_*.py" = ["F401", "F841"]
"refactor_step1.py" = ["F401"]

[tool.black]
line-length = 120
target-version = ["py310"]
