version: "3.9"

services:
  frontend:
    build:
      context: ./frontendVite
      dockerfile: Dockerfile
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "2345:80"
    depends_on:
      - backend
    cpu_count: 1
    cpu_quota: 50000
    cpu_period: 100000
    mem_limit: 800m
    memswap_limit: 1600m

  backend:
    build:
      context: .
      dockerfile: backend/dockerfile.backend
    labels:
      - com.centurylinklabs.watchtower.enable=true
    ports:
      - "127.0.0.1:5005:5005"
    environment:
      - FONT_ASSETS_DIR=/app/font_assets_host
      - FONT_ASSETS_BUNDLED_DIR=/app/font_assets
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-20}
    volumes:
      - ./ttf_files:/app/font_assets_host
      - ./logs:/app/logs
      - type: bind
        source: ./backend/tasks.db
        target: /app/backend/tasks.db
        read_only: false
    cpu_count: 1
    cpu_quota: 80000
    cpu_period: 100000
    mem_limit: 1500m
    memswap_limit: 4000m

  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --rolling-restart --schedule "0 0 */6 * * *"
